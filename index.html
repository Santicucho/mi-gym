<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Gym">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Mi Gym</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0f1115;
  --bg-2: #161a21;
  --bg-3: #1f242d;
  --border: #2a313c;
  --text: #e8ecf2;
  --text-dim: #8a93a3;
  --accent: #ff6b35;
  --accent-2: #ffa05c;
  --success: #4ade80;
  --warn: #facc15;
  --danger: #f87171;
  --fire: #ff6b35;
}
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
  min-height: 100vh;
  overscroll-behavior: none;
}
body {
  padding-bottom: 90px;
  padding-top: env(safe-area-inset-top);
}
.header {
  background: linear-gradient(180deg, #161a21 0%, #0f1115 100%);
  padding: 16px 20px 14px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}
.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.app-title {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.streak-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, #ff6b35, #ff8f3c);
  padding: 6px 12px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 14px;
  box-shadow: 0 4px 12px rgba(255,107,53,0.3);
}
.streak-pill .num { font-size: 16px; }
.tabs {
  display: flex;
  gap: 4px;
  padding: 0 16px;
}
.tab {
  flex: 1;
  padding: 10px 4px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 8px 8px 0 0;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab.active {
  color: var(--text);
  background: var(--bg-2);
}
.tab-content {
  display: none;
  padding: 16px;
  animation: fadeIn 0.2s ease;
}
.tab-content.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* Routine view */
.day-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.day-card.today {
  border-color: var(--accent);
  background: linear-gradient(135deg, #1f1612 0%, #161a21 100%);
  box-shadow: 0 4px 16px rgba(255,107,53,0.15);
}
.day-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.day-name {
  font-size: 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.day-name .day-emoji { font-size: 22px; }
.day-subtitle {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}
.day-arrow { color: var(--text-dim); font-size: 18px; }
.today-badge {
  font-size: 10px;
  background: var(--accent);
  color: #fff;
  padding: 3px 8px;
  border-radius: 8px;
  font-weight: 800;
  letter-spacing: 0.5px;
}

/* Exercise view */
.back-btn {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 15px;
  font-weight: 600;
  padding: 8px 0;
  margin-bottom: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.day-header-detail {
  margin-bottom: 16px;
}
.day-header-detail h2 {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 4px;
}
.day-header-detail p {
  color: var(--text-dim);
  font-size: 13px;
}
.exercise-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 12px;
  overflow: hidden;
}
.exercise-card.done {
  border-color: var(--success);
  background: linear-gradient(135deg, #14201a 0%, #161a21 100%);
}
.ex-top {
  display: flex;
  gap: 12px;
  align-items: center;
}
.ex-img {
  width: 64px;
  height: 64px;
  border-radius: 12px;
  background: var(--bg-3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  flex-shrink: 0;
  border: 1px solid var(--border);
}
.ex-info { flex: 1; min-width: 0; }
.ex-name {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 4px;
  line-height: 1.2;
}
.ex-prescription {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 11px;
}
.ex-tag {
  background: var(--bg-3);
  padding: 3px 8px;
  border-radius: 6px;
  color: var(--text-dim);
  font-weight: 600;
}
.ex-tag.reps { background: #1e2a3a; color: #93c5fd; }
.ex-tag.rir { background: #2a1e3a; color: #c4b5fd; }
.ex-tag.rest { background: #2a2a1e; color: #fde047; }
.ex-check {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: transparent;
  font-size: 18px;
  font-weight: 800;
  transition: all 0.2s;
}
.ex-check.checked {
  background: var(--success);
  border-color: var(--success);
  color: #0f1115;
}
.ex-sets {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--border);
}
.set-row {
  display: grid;
  grid-template-columns: 32px 1fr 1fr 36px;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}
.set-label {
  font-size: 12px;
  color: var(--text-dim);
  text-align: center;
  font-weight: 700;
}
.set-input {
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 10px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  width: 100%;
  outline: none;
  text-align: center;
  -webkit-appearance: none;
}
.set-input:focus {
  border-color: var(--accent);
  background: #1e1410;
}
.set-input::placeholder { color: #4a5260; font-weight: 400; }
.set-done {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: transparent;
  font-size: 14px;
  font-weight: 800;
}
.set-done.done {
  background: var(--success);
  border-color: var(--success);
  color: #0f1115;
}
.set-headers {
  display: grid;
  grid-template-columns: 32px 1fr 1fr 36px;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  font-weight: 700;
  text-align: center;
}
.last-weight {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 6px;
  text-align: center;
}
.last-weight strong { color: var(--accent-2); }

/* Rest control por ejercicio */
.rest-control {
  background: linear-gradient(135deg, #1a1612 0%, #1f242d 100%);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 12px;
}
.rest-recommended {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.rest-recommended strong { color: var(--accent-2); }
.rest-edit {
  display: flex;
  gap: 6px;
  align-items: center;
}
.rest-adj {
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text);
  min-width: 38px;
  height: 36px;
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
  font-size: 12px;
  flex-shrink: 0;
  padding: 0 6px;
}
.rest-adj:active { transform: scale(0.95); }
.rest-input {
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--accent-2);
  width: 64px;
  height: 36px;
  border-radius: 8px;
  text-align: center;
  font-weight: 800;
  font-size: 15px;
  -webkit-appearance: none;
  outline: none;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}
.rest-input:focus { border-color: var(--accent); background: #1e1410; }
.rest-input::-webkit-inner-spin-button, .rest-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.rest-unit {
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 700;
}
.rest-start {
  flex: 1;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border: none;
  color: #fff;
  border-radius: 8px;
  font-weight: 800;
  font-size: 12px;
  cursor: pointer;
  height: 36px;
  letter-spacing: 0.3px;
  padding: 0 10px;
  white-space: nowrap;
}
.rest-start:active { transform: scale(0.97); }

.finish-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border: none;
  border-radius: 14px;
  color: #fff;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  margin-top: 8px;
  letter-spacing: 0.3px;
  box-shadow: 0 6px 20px rgba(255,107,53,0.25);
}
.finish-btn:disabled {
  background: var(--bg-3);
  color: var(--text-dim);
  box-shadow: none;
  cursor: not-allowed;
}

/* Streak view */
.streak-hero {
  background: linear-gradient(135deg, #ff6b35 0%, #ff4a1c 100%);
  border-radius: 20px;
  padding: 28px 20px;
  text-align: center;
  margin-bottom: 20px;
  box-shadow: 0 10px 40px rgba(255,107,53,0.3);
}
.streak-fire { font-size: 56px; margin-bottom: 8px; }
.streak-num {
  font-size: 64px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 4px;
}
.streak-label {
  font-size: 14px;
  font-weight: 700;
  opacity: 0.9;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.streak-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  text-align: center;
}
.stat-card .val {
  font-size: 28px;
  font-weight: 800;
  color: var(--accent-2);
}
.stat-card .lbl {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 4px;
  font-weight: 700;
}
.calendar {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
}
.cal-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-day-name {
  font-size: 10px;
  text-align: center;
  color: var(--text-dim);
  font-weight: 700;
  text-transform: uppercase;
  padding: 4px 0;
}
.cal-cell {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--text-dim);
  border-radius: 8px;
  font-weight: 600;
}
.cal-cell.done {
  background: var(--accent);
  color: #fff;
  font-weight: 800;
}
.cal-cell.today {
  border: 2px solid var(--accent-2);
  color: var(--accent-2);
  font-weight: 800;
}
.cal-cell.today.done { color: #fff; }
.cal-cell.empty { background: transparent; }

/* History view */
.history-section {
  margin-bottom: 16px;
}
.history-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.history-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
}
.hist-ex-name {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 8px;
}
.hist-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px dashed var(--border);
  font-size: 12px;
}
.hist-row:last-child { border-bottom: none; }
.hist-date { color: var(--text-dim); }
.hist-data { font-weight: 700; }
.hist-pr { color: var(--success); font-weight: 800; }

/* Toast */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-3);
  border: 1px solid var(--border);
  padding: 12px 18px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  max-width: 90%;
  text-align: center;
}
.toast.show { opacity: 1; }
.toast.success { border-color: var(--success); color: var(--success); }
.toast.fire { border-color: var(--fire); color: var(--accent-2); }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
}
.empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* Notes section */
.notes-section {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 12px;
}
.notes-section h3 {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.notes-section ul { list-style: none; }
.notes-section li {
  font-size: 13px;
  padding: 4px 0;
  color: var(--text);
  display: flex;
  gap: 8px;
}
.notes-section li::before { content: "•"; color: var(--accent); }

/* Bottom nav alternative — kept tabs at top */

/* Confirm modal */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-bg.show { display: flex; }
.modal {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  max-width: 320px;
  width: 100%;
  text-align: center;
}
.modal h3 { font-size: 18px; margin-bottom: 8px; }
.modal p { color: var(--text-dim); font-size: 14px; margin-bottom: 16px; }
.modal-btns { display: flex; gap: 8px; }
.modal-btns button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
}
.btn-cancel { background: var(--bg-3); color: var(--text); }
.btn-confirm { background: var(--accent); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }

/* Timer (descanso entre series) */
.timer-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(180deg, #1f242d 0%, #161a21 100%);
  border-top: 2px solid var(--accent);
  padding: 14px 16px;
  padding-bottom: calc(14px + env(safe-area-inset-bottom));
  display: none;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  z-index: 150;
  box-shadow: 0 -8px 28px rgba(0,0,0,0.5);
}
.timer-bar.show { display: flex; }
.timer-bar.done {
  background: linear-gradient(180deg, #16321f 0%, #0f1115 100%);
  border-color: var(--success);
  animation: pulseGreen 0.6s ease infinite alternate;
}
@keyframes pulseGreen {
  from { box-shadow: 0 -8px 28px rgba(74,222,128,0.25); }
  to { box-shadow: 0 -8px 28px rgba(74,222,128,0.75); }
}
.timer-info {
  display: flex;
  flex-direction: column;
  min-width: 0;
  flex: 1;
}
.timer-label {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.timer-display {
  font-size: 30px;
  font-weight: 800;
  color: var(--accent-2);
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
  letter-spacing: -1px;
}
.timer-bar.done .timer-display { color: var(--success); font-size: 22px; }
.timer-controls { display: flex; gap: 6px; flex-shrink: 0; }
.timer-controls button {
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--text);
  min-width: 40px;
  height: 40px;
  padding: 0 10px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.timer-controls button.danger { background: var(--bg-3); color: var(--danger); }
.timer-controls button:active { transform: scale(0.95); }

/* DIETA */
.macros-hero {
  background: linear-gradient(135deg, #1a3a2a 0%, #161a21 100%);
  border: 1px solid #2a5a3a;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
}
.macros-hero h3 {
  font-size: 12px;
  color: #4ade80;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 10px;
  font-weight: 700;
}
.macros-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.macro-box {
  background: rgba(0,0,0,0.25);
  border-radius: 10px;
  padding: 10px 6px;
  text-align: center;
}
.macro-val {
  font-size: 18px;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
}
.macro-lbl {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  font-weight: 600;
}
.meal-section { margin-bottom: 22px; }
.meal-section-title {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.meal-section-subtitle {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 12px;
  margin-top: -6px;
  font-weight: 500;
}
.meal-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: all 0.2s;
}
.meal-card.open { border-color: var(--accent); }
.meal-card-header {
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
}
.meal-emoji {
  font-size: 28px;
  width: 40px;
  text-align: center;
  flex-shrink: 0;
}
.meal-info { flex: 1; min-width: 0; }
.meal-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.meal-macros {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.meal-pill {
  background: var(--bg-3);
  padding: 2px 7px;
  border-radius: 5px;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-dim);
}
.meal-pill.kcal { background: #2a1e10; color: #ffa05c; }
.meal-pill.prot { background: #102a2a; color: #5cccc4; }
.meal-arrow {
  font-size: 18px;
  color: var(--text-dim);
  transition: transform 0.2s;
}
.meal-card.open .meal-arrow { transform: rotate(90deg); color: var(--accent); }
.meal-body {
  display: none;
  padding: 0 14px 14px;
  border-top: 1px dashed var(--border);
  padding-top: 14px;
  margin-top: -1px;

// ============================================
let state = {
  streak: { current: 0, best: 0, lastDate: null },
  history: {}, // { 'YYYY-MM-DD': { dayId, exercises: { exId: [{weight, reps, done}] } } }
  currentSession: null,
  calMonth: new Date().getMonth(),
  calYear: new Date().getFullYear(),
  shopping: { checked: {}, custom: [] },
  openMeal: null,
  customRest: {} // { exerciseId: seconds } — tiempo de descanso personalizado por ejercicio
};

function load() {
  const saved = localStorage.getItem('migym_state');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
    } catch(e) { console.error(e); }
  }
}
function save() {
  localStorage.setItem('migym_state', JSON.stringify({
    streak: state.streak,
    history: state.history,
    currentSession: state.currentSession,
    shopping: state.shopping,
    customRest: state.customRest
  }));
}
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dayKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}
function getTodayRoutineDay() {
  const day = new Date().getDay(); // 0=dom, 1=lun...
  return ROUTINE[(day + 6) % 7]; // lunes=0
}

// ============================================
// RENDER RUTINA
// ============================================
function renderRoutine() {
  const today = getTodayRoutineDay();
  const container = document.getElementById('routineView');
  container.innerHTML = ROUTINE.map(day => `
    <div class="day-card ${day.id === today.id ? 'today' : ''}" onclick="openDay('${day.id}')">
      <div class="day-card-header">
        <div>
          <div class="day-name"><span class="day-emoji">${day.emoji}</span>${day.name}</div>
          <div class="day-subtitle">${day.subtitle}</div>
        </div>
        ${day.id === today.id ? '<span class="today-badge">HOY</span>' : '<span class="day-arrow">›</span>'}
      </div>
    </div>
  `).join('');
  document.getElementById('routineView').style.display = 'block';
  document.getElementById('dayView').style.display = 'none';
}

function openDay(dayId) {
  const day = ROUTINE.find(d => d.id === dayId);
  if (!day) return;
  const tk = todayKey();
  const isToday = day.id === getTodayRoutineDay().id;

  // Inicializa sesión SIEMPRE para días con ejercicios — el usuario puede registrar pesos cualquier día
  if (!day.rest) {
    if (!state.currentSession || state.currentSession.date !== tk || state.currentSession.dayId !== dayId) {
      // Si ya hay datos guardados hoy para este día de rutina, los reusamos
      const existing = state.history[tk];
      if (existing && existing.dayId === dayId && existing.exercises) {
        state.currentSession = { date: tk, dayId, exercises: JSON.parse(JSON.stringify(existing.exercises)) };
      } else {
        state.currentSession = { date: tk, dayId, exercises: {} };
        day.exercises.forEach(ex => {
          state.currentSession.exercises[ex.id] = Array.from({length: ex.sets}, () => ({weight:'', reps:'', done:false}));
        });
      }
      save();
    }
  }

  const lastData = getLastWeights(dayId);

  document.getElementById('routineView').style.display = 'none';
  const dv = document.getElementById('dayView');
  dv.style.display = 'block';

  if (day.rest) {
    dv.innerHTML = `
      <button class="back-btn" onclick="renderRoutine()">‹ Volver</button>
      <div class="day-header-detail">
        <h2>${day.emoji} ${day.name}</h2>
        <p>${day.subtitle}</p>
      </div>
      <div class="notes-section">
        <h3>📋 Recomendaciones</h3>
        <ul>${day.notes.map(n=>`<li>${n}</li>`).join('')}</ul>
      </div>
      ${isToday ? `<button class="finish-btn" onclick="completeRestDay()">✓ Marcar día de descanso completado</button>` : ''}
    `;
    return;
  }

  dv.innerHTML = `
    <button class="back-btn" onclick="renderRoutine()">‹ Volver</button>
    <div class="day-header-detail">
      <h2>${day.emoji} ${day.name}</h2>
      <p>${day.subtitle}</p>
    </div>
    <div class="notes-section">
      <h3>📋 Notas clave</h3>
      <ul>${day.notes.map(n=>`<li>${n}</li>`).join('')}</ul>
    </div>
    <div id="exerciseList">
      ${day.exercises.map(ex => renderExercise(ex, true, lastData[ex.id])).join('')}
    </div>
    <button class="finish-btn" id="finishBtn" onclick="finishWorkout()">✓ Finalizar entrenamiento de hoy</button>
    ${!isToday ? `<p style="text-align:center;color:var(--text-dim);font-size:12px;margin-top:10px;">ℹ️ Hoy en el calendario es <strong style="color:var(--accent-2);">${getTodayRoutineDay().name.split('—')[0].trim()}</strong>. Al finalizar se registrará en la fecha de hoy.</p>` : ''}
  `;
}

function renderExercise(ex, isToday, lastData) {
  const sess = state.currentSession?.exercises[ex.id] || Array.from({length: ex.sets}, () => ({weight:'', reps:'', done:false}));
  const allDone = sess.every(s => s.done);
  return `
    <div class="exercise-card ${allDone ? 'done' : ''}" id="ex-${ex.id}">
      <div class="ex-top">
        <div class="ex-img">${ex.emoji}</div>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-prescription">
            <span class="ex-tag">${ex.sets} series</span>
            <span class="ex-tag reps">${ex.reps} reps</span>
            <span class="ex-tag rir">RIR ${ex.rir}</span>
            <span class="ex-tag rest">⏱ ${ex.rest}</span>
          </div>
        </div>
      </div>
      ${isToday ? `
        <div class="ex-sets">
          <div class="rest-control">
            <div class="rest-recommended">⏱ Recomendado: <strong>${ex.rest}</strong> · Edita y descansa lo que quieras</div>
            <div class="rest-edit">
              <button class="rest-adj" onclick="adjRest('${ex.id}', -15)">−15s</button>
              <input type="number" class="rest-input" value="${state.customRest[ex.id] || parseRest(ex.rest)}" onchange="setCustomRest('${ex.id}', this.value)" min="5" max="600">
              <span class="rest-unit">s</span>
              <button class="rest-adj" onclick="adjRest('${ex.id}', 15)">+15s</button>
              <button class="rest-start" onclick="startRestForEx('${ex.id}')">▶ Iniciar</button>
            </div>
          </div>
          <div class="set-headers">
            <div>SET</div>
            <div>KG</div>
            <div>REPS</div>
            <div>✓</div>
          </div>
          ${sess.map((s, i) => `
            <div class="set-row">
              <div class="set-label">${i+1}</div>
              <input type="number" class="set-input" placeholder="${lastData?.[i]?.weight || '—'}" value="${s.weight}" onchange="updateSet('${ex.id}', ${i}, 'weight', this.value)" inputmode="decimal">
              <input type="number" class="set-input" placeholder="${lastData?.[i]?.reps || '—'}" value="${s.reps}" onchange="updateSet('${ex.id}', ${i}, 'reps', this.value)" inputmode="numeric">
              <button class="set-done ${s.done ? 'done' : ''}" onclick="toggleSet('${ex.id}', ${i})">✓</button>
            </div>
          `).join('')}
          ${lastData ? `<div class="last-weight">Última vez: <strong>${lastData.map(d=>`${d.weight||'-'}kg×${d.reps||'-'}`).join(' / ')}</strong></div>` : ''}
        </div>
      ` : ''}
    </div>
  `;
}

function updateSet(exId, setIdx, field, value) {
  if (!state.currentSession) return;
  state.currentSession.exercises[exId][setIdx][field] = value;
  save();
}

function toggleSet(exId, setIdx) {
  if (!state.currentSession) return;
  const s = state.currentSession.exercises[exId][setIdx];
  const wasNotDone = !s.done;
  s.done = !s.done;
  save();
  // Re-render this exercise card
  const day = ROUTINE.find(d => d.id === state.currentSession.dayId);
  const ex = day.exercises.find(e => e.id === exId);
  const lastData = getLastWeights(day.id)[exId];
  const card = document.getElementById(`ex-${exId}`);
  if (card) card.outerHTML = renderExercise(ex, true, lastData);
  // Lanzar cronómetro si se acaba de marcar como completada
  if (wasNotDone && s.done) {
    const seconds = state.customRest[ex.id] || parseRest(ex.rest);
    if (seconds > 0) startTimer(seconds, `${ex.name} · Serie ${setIdx + 1}`);
  }
}

// Tiempo de descanso personalizado por ejercicio
function setCustomRest(exId, value) {
  const seconds = Math.max(5, Math.min(600, parseInt(value) || 0));
  state.customRest[exId] = seconds;
  save();
  // Re-render solo el input para reflejar el clamp
  const input = document.querySelector(`#ex-${exId} .rest-input`);
  if (input) input.value = seconds;
}

function adjRest(exId, delta) {
  const day = ROUTINE.find(d => d.id === state.currentSession?.dayId);
  if (!day) return;
  const ex = day.exercises.find(e => e.id === exId);
  if (!ex) return;
  const current = state.customRest[exId] || parseRest(ex.rest);
  const newVal = Math.max(5, Math.min(600, current + delta));
  state.customRest[exId] = newVal;
  save();
  const input = document.querySelector(`#ex-${exId} .rest-input`);
  if (input) input.value = newVal;
}

function startRestForEx(exId) {
  const day = ROUTINE.find(d => d.id === state.currentSession?.dayId);
  if (!day) return;
  const ex = day.exercises.find(e => e.id === exId);
  if (!ex) return;
  const seconds = state.customRest[exId] || parseRest(ex.rest);
  startTimer(seconds, `${ex.name} · Descanso`);
}

      card.classList.add('open');
      setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
    }
  }

          </div>
        `).join('')}
      </div>
    `;
  });

  // Custom items section
  html += `
    <div class="shop-cat">
      <div class="shop-cat-title">📝 Mis items extras<span class="cnt">${state.shopping.custom.length}</span></div>
      ${state.shopping.custom.map((it, idx) => `
        <div class="shop-item ${state.shopping.checked[it] ? 'checked' : ''}">
          <div class="shop-check" onclick="toggleShopItem('${escapeStr(it)}')">✓</div>
          <div class="shop-text" onclick="toggleShopItem('${escapeStr(it)}')">${it}</div>
          <button class="shop-del" onclick="removeCustom(${idx})">🗑️</button>
        </div>
      `).join('')}
      <div class="shop-add-row">
        <input type="text" class="shop-add-input" id="customInput" placeholder="Añadir item..." onkeypress="if(event.key==='Enter')addCustom()">
        <button class="shop-add-btn" onclick="addCustom()">+ Añadir</button>
      </div>
    </div>
  `;

  container.innerHTML = html;
}

function escapeStr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function toggleShopItem(item) {
  // Unescape
  const key = item.replace(/\\'/g, "'");
  state.shopping.checked[key] = !state.shopping.checked[key];
  if (!state.shopping.checked[key]) delete state.shopping.checked[key];
  save();
  renderShopping();
}

function addCustom() {
  const input = document.getElementById('customInput');
  const val = input.value.trim();
  if (!val) return;
  if (!state.shopping.custom.includes(val)) {
    state.shopping.custom.push(val);
    save();
    renderShopping();
  }
  setTimeout(() => {
    const newInput = document.getElementById('customInput');
    if (newInput) newInput.focus();
  }, 50);
}

function removeCustom(idx) {
  const item = state.shopping.custom[idx];
  state.shopping.custom.splice(idx, 1);
  if (item) delete state.shopping.checked[item];
  save();
  renderShopping();
}

function clearShopping() {
  openModal(
    '↻ ¿Limpiar todas las marcas?',
    'Esto desmarca todos los items pero conserva tu lista (los items extras también se mantienen).',
    () => {
      state.shopping.checked = {};
      save();
      closeModal();
      renderShopping();
      showToast('Lista limpia');
    }
  );
}

// ============================================
// CRONÓMETRO DE DESCANSO
// ============================================
let timer = {
  interval: null,
  secondsLeft: 0,
  running: false,
  audioCtx: null
};

function parseRest(str) {
  if (!str) return 0;
  const minMatch = String(str).match(/(\d+)(?:\s*[-–]\s*(\d+))?\s*min/i);
  if (minMatch) {
    const lo = parseInt(minMatch[1]);
    const hi = minMatch[2] ? parseInt(minMatch[2]) : lo;
    return Math.round((lo + hi) / 2 * 60);
  }
  const secMatch = String(str).match(/(\d+)(?:\s*[-–]\s*(\d+))?\s*s/i);
  if (secMatch) {
    const lo = parseInt(secMatch[1]);
    const hi = secMatch[2] ? parseInt(secMatch[2]) : lo;
    return Math.round((lo + hi) / 2);
  }
  return 60;
}

function startTimer(seconds, label) {
  if (timer.interval) clearInterval(timer.interval);
  timer.secondsLeft = seconds;
  timer.running = true;
  document.getElementById('timerLabel').textContent = label || 'Descanso';
  const bar = document.getElementById('timerBar');
  bar.classList.add('show');
  bar.classList.remove('done');
  document.getElementById('timerPauseBtn').textContent = '⏸';
  updateTimerDisplay();
  timer.interval = setInterval(() => {
    if (!timer.running) return;
    timer.secondsLeft--;
    updateTimerDisplay();
    if (timer.secondsLeft <= 0) timerEnded();
  }, 1000);
}

function updateTimerDisplay() {
  const s = Math.max(0, timer.secondsLeft);
  const mm = Math.floor(s / 60);
  const ss = s % 60;
  document.getElementById('timerDisplay').textContent = `${mm}:${String(ss).padStart(2,'0')}`;
}

function timerEnded() {
  clearInterval(timer.interval);
  timer.interval = null;
  timer.running = false;
  const bar = document.getElementById('timerBar');
  bar.classList.add('done');
  document.getElementById('timerDisplay').textContent = '¡A por la siguiente!';
  document.getElementById('timerPauseBtn').textContent = '▶';
  beep();
  if (navigator.vibrate) navigator.vibrate([300, 120, 300, 120, 500]);
}

function beep() {
  try {
    if (!timer.audioCtx) {
      timer.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    const ctx = timer.audioCtx;
    if (ctx.state === 'suspended') ctx.resume();
    const playTone = (freq, start, dur) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime + start);
      gain.gain.linearRampToValueAtTime(0.35, ctx.currentTime + start + 0.01);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + start + dur);
      osc.start(ctx.currentTime + start);
      osc.stop(ctx.currentTime + start + dur);
    };
    playTone(880, 0, 0.25);
    playTone(1175, 0.3, 0.25);
    playTone(1568, 0.6, 0.4);
  } catch(e) {}
}

function toggleTimerPause() {
  if (timer.secondsLeft <= 0) {
    closeTimer();
    return;
  }
  timer.running = !timer.running;
  document.getElementById('timerPauseBtn').textContent = timer.running ? '⏸' : '▶';
}

function adjustTimer(delta) {
  const bar = document.getElementById('timerBar');
  if (timer.secondsLeft <= 0 && delta > 0) {
    timer.secondsLeft = delta;
    timer.running = true;
    bar.classList.remove('done');
    document.getElementById('timerPauseBtn').textContent = '⏸';
    if (!timer.interval) {
      timer.interval = setInterval(() => {
        if (!timer.running) return;
        timer.secondsLeft--;
        updateTimerDisplay();
        if (timer.secondsLeft <= 0) timerEnded();
      }, 1000);
    }
  } else {
    timer.secondsLeft = Math.max(5, timer.secondsLeft + delta);
  }
  updateTimerDisplay();
}

function closeTimer() {
  if (timer.interval) clearInterval(timer.interval);
  timer.interval = null;
  timer.running = false;
  timer.secondsLeft = 0;
  const bar = document.getElementById('timerBar');
  bar.classList.remove('show', 'done');
}

// "Desbloquear" el audio en el primer toque (iOS requiere interacción del usuario)
document.addEventListener('touchstart', function unlockAudio() {
  try {
    if (!timer.audioCtx) timer.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (timer.audioCtx.state === 'suspended') timer.audioCtx.resume();
  } catch(e) {}
  document.removeEventListener('touchstart', unlockAudio);
}, { once: true });

function getLastWeights(dayId) {
  // Get last session for this day
  const dates = Object.keys(state.history)
    .filter(d => state.history[d].dayId === dayId)
    .sort()
    .reverse();
  if (dates.length === 0) return {};
  return state.history[dates[0]].exercises || {};
}

function finishWorkout() {
  if (!state.currentSession) return;
  const day = ROUTINE.find(d => d.id === state.currentSession.dayId);
  const totalSets = day.exercises.reduce((a, ex) => a + ex.sets, 0);
  const doneSets = Object.values(state.currentSession.exercises)
    .flat().filter(s => s.done).length;
  if (doneSets === 0) {
    showToast('⚠️ Marca al menos una serie como completada', 'fire');
    return;
  }
  openModal(
    `🔥 ¿Finalizar entrenamiento?`,
    `Has completado ${doneSets}/${totalSets} series. Esto sumará a tu racha de hoy.`,
    () => {
      const tk = todayKey();
      state.history[tk] = {
        dayId: state.currentSession.dayId,
        exercises: state.currentSession.exercises,
        completed: true
      };
      updateStreak(tk);
      state.currentSession = null;
      save();
      closeModal();
      showToast(`🔥 ¡Día sumado! Racha: ${state.streak.current} días`, 'fire');
      renderRoutine();
      renderStreak();
      renderHistory();
      updateHeader();
    }
  );
}

function completeRestDay() {
  openModal(
    `😴 ¿Marcar descanso como completado?`,
    `Los días de descanso también suman a la racha — el descanso es entrenamiento.`,
    () => {
      const tk = todayKey();
      const day = getTodayRoutineDay();
      state.history[tk] = {
        dayId: day.id,
        exercises: {},
        completed: true,
        rest: true
      };
      updateStreak(tk);
      save();
      closeModal();
      showToast(`🔥 ¡Descanso registrado! Racha: ${state.streak.current} días`, 'fire');
      renderRoutine();
      renderStreak();
      updateHeader();
    }
  );
}

function updateStreak(dateKey) {
  const last = state.streak.lastDate;
  if (!last) {
    state.streak.current = 1;
  } else {
    const lastD = new Date(last);
    const todayD = new Date(dateKey);
    const diff = Math.floor((todayD - lastD) / (1000*60*60*24));
    if (diff === 0) return; // ya contado hoy
    if (diff === 1) state.streak.current += 1;
    else state.streak.current = 1;
  }
  state.streak.lastDate = dateKey;
  if (state.streak.current > state.streak.best) state.streak.best = state.streak.current;
}

// ============================================
// RACHA TAB
// ============================================
function renderStreak() {
  document.getElementById('streakBig').textContent = state.streak.current;
  document.getElementById('bestStreak').textContent = state.streak.best;
  document.getElementById('totalDays').textContent = Object.keys(state.history).filter(d => state.history[d].completed).length;
  renderCalendar();
}

function changeMonth(delta) {
  state.calMonth += delta;
  if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
  if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
  renderCalendar();
}

function renderCalendar() {
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('calMonthName').textContent = `${months[state.calMonth]} ${state.calYear}`;
  const firstDay = new Date(state.calYear, state.calMonth, 1).getDay(); // 0=dom
  const offset = (firstDay + 6) % 7; // lunes=0
  const daysInMonth = new Date(state.calYear, state.calMonth+1, 0).getDate();
  const tk = todayKey();

  let html = ['L','M','X','J','V','S','D'].map(d => `<div class="cal-day-name">${d}</div>`).join('');
  for (let i = 0; i < offset; i++) html += '<div class="cal-cell empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = `${state.calYear}-${String(state.calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const done = state.history[dateKey]?.completed;
    const isToday = dateKey === tk;
    html += `<div class="cal-cell ${done ? 'done' : ''} ${isToday ? 'today' : ''}">${d}</div>`;
  }
  document.getElementById('calendar').innerHTML = html;
}

// ============================================
// HISTORIAL TAB
// ============================================
function renderHistory() {
  const container = document.getElementById('historyView');
  // Group history by exercise
  const byEx = {};
  Object.keys(state.history).sort().reverse().forEach(date => {
    const sess = state.history[date];
    if (!sess.exercises) return;
    Object.entries(sess.exercises).forEach(([exId, sets]) => {
      const validSets = sets.filter(s => s.weight || s.reps);
      if (validSets.length === 0) return;
      if (!byEx[exId]) byEx[exId] = [];
      byEx[exId].push({ date, sets: validSets });
    });
  });

  const allExercises = ROUTINE.flatMap(d => d.exercises);
  const sections = Object.keys(byEx).map(exId => {
    const ex = allExercises.find(e => e.id === exId);
    if (!ex) return '';
    const sessions = byEx[exId].slice(0, 5);
    // Find best weight
    let bestW = 0;
    byEx[exId].forEach(s => s.sets.forEach(set => {
      const w = parseFloat(set.weight);
      if (!isNaN(w) && w > bestW) bestW = w;
    }));
    return `
      <div class="history-card">
        <div class="hist-ex-name">${ex.emoji} ${ex.name}</div>
        ${sessions.map(s => {
          const isBest = s.sets.some(set => parseFloat(set.weight) === bestW && bestW > 0);
          return `
          <div class="hist-row">
            <span class="hist-date">${formatDate(s.date)}</span>
            <span class="hist-data ${isBest ? 'hist-pr' : ''}">${s.sets.map(set => `${set.weight||'-'}kg×${set.reps||'-'}`).join(' / ')} ${isBest ? '🏆' : ''}</span>
          </div>
        `;}).join('')}
      </div>
    `;
  }).join('');

  if (!sections) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="emoji">📊</div>
        <p>Aún no hay historial. Completa tu primer entrenamiento para ver datos aquí.</p>
      </div>
    `;
    return;
  }
  container.innerHTML = `
    <div class="history-section">
      <div class="history-title">Tu progreso por ejercicio</div>
      ${sections}
    </div>
    <button class="finish-btn" style="background:var(--danger);box-shadow:none;margin-top:20px;" onclick="confirmReset()">🗑️ Borrar todos los datos</button>
  `;
}

function formatDate(key) {
  const [y,m,d] = key.split('-');
  return `${d}/${m}`;
}

function confirmReset() {
  openModal(
    '⚠️ ¿Borrar todo?',
    'Esto eliminará rachas, historial y datos. No se puede deshacer.',
    () => {
      localStorage.removeItem('migym_state');
      state = {
        streak: { current: 0, best: 0, lastDate: null },
        history: {},
        currentSession: null,
        calMonth: new Date().getMonth(),
        calYear: new Date().getFullYear()
      };
      closeModal();
      showToast('Datos borrados');
      renderRoutine();
      renderStreak();
      renderHistory();
      updateHeader();
    },
    true
  );
}

// ============================================
// UI HELPERS
// ============================================
function updateHeader() {
  document.getElementById('streakHeader').textContent = state.streak.current;
}

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => t.className = `toast ${type}`, 2500);
}

function openModal(title, msg, onConfirm, danger = false) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMsg').textContent = msg;
  const btn = document.getElementById('modalConfirm');
  btn.textContent = danger ? 'Borrar' : 'Confirmar';
  btn.className = danger ? 'btn-danger' : 'btn-confirm';
  btn.onclick = onConfirm;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
}

// ============================================
// TABS
// ============================================
document.querySelectorAll('.tab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById(`tab-${tab}`).classList.add('active');
    if (tab === 'streak') renderStreak();
    if (tab === 'history') renderHistory();
    if (tab === 'routine') renderRoutine();
    if (tab === 'diet') renderDiet();
    if (tab === 'shopping') renderShopping();
  };
});

// ============================================
// INIT
// ============================================
load();
// Protección por compatibilidad con versiones anteriores
if (!state.shopping) state.shopping = { checked: {}, custom: [] };
if (!state.shopping.checked) state.shopping.checked = {};
if (!state.shopping.custom) state.shopping.custom = [];
if (!state.customRest) state.customRest = {};
// Check streak break: if lastDate is more than 1 day ago, break streak
if (state.streak.lastDate) {
  const lastD = new Date(state.streak.lastDate);
  const today = new Date(todayKey());
  const diff = Math.floor((today - lastD) / (1000*60*60*24));
  if (diff > 1) state.streak.current = 0;
}
updateHeader();
renderRoutine();
renderStreak();
renderHistory();

// Service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
